<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建築ブースト</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#3a7bd5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <div id="root"></div>
  <script>
    if ('serviceWorker' in navigator && !window.api) {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.log('SW registration failed:', err));
    }
    // 自動アップデート検知（Web版のみ）
    if (!window.api) {
      let currentVersion = null;
      async function checkUpdate() {
        try {
          const r = await fetch('/api/version');
          const j = await r.json();
          if (currentVersion === null) {
            currentVersion = j.version;
          } else if (currentVersion !== j.version) {
            console.log('新しいバージョンを検出。リロードします...');
            if ('serviceWorker' in navigator) {
              const reg = await navigator.serviceWorker.getRegistration();
              if (reg) { await reg.update(); await caches.delete('kenchiku-boost-v1'); }
            }
            location.reload();
          }
        } catch (e) {}
      }
      checkUpdate();
      setInterval(checkUpdate, 30000); // 30秒ごとにチェック
    }
  </script>
</body>
</html>
