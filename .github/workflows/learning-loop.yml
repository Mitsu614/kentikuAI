name: learning-loop

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 0'

jobs:
  analyze-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 実績データ取得 & Claude API で分析 & 係数更新
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node << 'SCRIPT'
          const https = require('https');

          const SUPABASE_URL = process.env.SUPABASE_URL;
          const SUPABASE_KEY = process.env.SUPABASE_SERVICE_KEY;
          const ANTHROPIC_KEY = process.env.ANTHROPIC_API_KEY;

          function supabaseGet(table, query) {
            return new Promise((resolve, reject) => {
              const url = new URL(`${SUPABASE_URL}/rest/v1/${table}${query || ''}`);
              https.get({
                hostname: url.hostname, path: url.pathname + url.search,
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` },
              }, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  if (res.statusCode >= 200 && res.statusCode < 300) resolve(JSON.parse(data));
                  else reject(new Error(`${res.statusCode}: ${data}`));
                });
              }).on('error', reject);
            });
          }

          function supabasePost(table, body, method = 'POST', extraHeaders = {}) {
            return new Promise((resolve, reject) => {
              const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
              const jsonBody = JSON.stringify(body);
              const req = https.request({
                hostname: url.hostname, path: url.pathname + url.search,
                method,
                headers: {
                  'apikey': SUPABASE_KEY,
                  'Authorization': `Bearer ${SUPABASE_KEY}`,
                  'Content-Type': 'application/json',
                  'Prefer': 'resolution=merge-duplicates',
                  ...extraHeaders,
                },
              }, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  if (res.statusCode >= 200 && res.statusCode < 300) resolve(data ? JSON.parse(data) : null);
                  else reject(new Error(`${res.statusCode}: ${data}`));
                });
              });
              req.on('error', reject);
              req.write(jsonBody);
              req.end();
            });
          }

          function callClaude(prompt) {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 4000,
                temperature: 0,
                messages: [{ role: 'user', content: prompt }],
              });
              const req = https.request({
                hostname: 'api.anthropic.com', path: '/v1/messages', method: 'POST',
                headers: {
                  'x-api-key': ANTHROPIC_KEY,
                  'anthropic-version': '2023-06-01',
                  'content-type': 'application/json',
                },
              }, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  if (res.statusCode >= 200 && res.statusCode < 300) {
                    const parsed = JSON.parse(data);
                    resolve(parsed.content[0].text);
                  } else reject(new Error(`Claude ${res.statusCode}: ${data}`));
                });
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          async function main() {
            console.log('=== 学習ループ開始 ===');

            // 1. Supabaseから全実績データを取得
            const feedback = await supabaseGet('estimate_feedback', '?select=*&order=created_at.desc&limit=1000');
            console.log(`実績データ: ${feedback.length}件`);

            if (feedback.length < 3) {
              console.log('データが少なすぎるため（3件未満）、今回はスキップ');
              // 実行ログだけ記録
              await supabasePost('learning_runs', {
                feedback_count: feedback.length,
                coefficients_updated: 0,
                summary: 'データ不足のためスキップ（最低3件必要）',
                status: 'skipped',
              });
              return;
            }

            // 2. 工事種別ごとに集計
            const byType = {};
            for (const fb of feedback) {
              const wt = fb.work_type || '不明';
              if (!byType[wt]) byType[wt] = [];
              byType[wt].push(fb);
            }

            const summary = Object.entries(byType).map(([wt, items]) => {
              const list = items;
              const avgAiTotal = list.reduce((s, f) => s + (f.ai_total || 0), 0) / list.length;
              const avgActual = list.reduce((s, f) => s + (f.actual_selling_price || f.ai_total || 0), 0) / list.length;
              const avgAiMat = list.reduce((s, f) => s + (f.ai_material_cost || 0), 0) / list.length;
              const avgActMat = list.reduce((s, f) => s + (f.actual_material_cost || f.ai_material_cost || 0), 0) / list.length;
              const avgAiLab = list.reduce((s, f) => s + (f.ai_labor_cost || 0), 0) / list.length;
              const avgActLab = list.reduce((s, f) => s + (f.actual_labor_cost || f.ai_labor_cost || 0), 0) / list.length;
              return `工事種別: ${wt} (${list.length}件)\n  AI材料費平均: ${Math.round(avgAiMat)}円 → 実績: ${Math.round(avgActMat)}円\n  AI労務費平均: ${Math.round(avgAiLab)}円 → 実績: ${Math.round(avgActLab)}円\n  AI合計平均: ${Math.round(avgAiTotal)}円 → 実績売価: ${Math.round(avgActual)}円`;
            }).join('\n\n');

            // 3. Claude APIで分析
            const prompt = `あなたは建築見積AIの精度改善を担当するデータサイエンティストです。

以下は、建築見積AIが出した予測と、実際の施工費用の比較データです。
このデータを分析して、各工事種別の見積補正係数を算出してください。

## 実績データ集計
${summary}

## 出力形式
以下のJSON配列を返してください。他のテキストは不要です。
\`\`\`json
[
  {
    "work_type": "工事種別名",
    "material_adjustment": 1.0,  // 材料費の補正係数（1.0=変更なし、1.1=10%増、0.9=10%減）
    "labor_adjustment": 1.0,     // 労務費の補正係数
    "confidence": 0.0,           // 信頼度（0〜1、データ件数と乖離の一貫性で判断）
    "avg_accuracy": 1.0,         // 平均精度（実績/AI予測）
    "notes": "分析メモ"
  }
]
\`\`\`

ルール:
- データが2件未満の工事種別はconfidence=0.1以下にする
- AI予測と実績の乖離が5%未満なら補正係数は1.0のままにする
- 極端な外れ値は除外して判断する
- notesには判断根拠を簡潔に書く`;

            console.log('Claude APIに分析を依頼中...');
            const response = await callClaude(prompt);

            // JSONを抽出
            const jsonMatch = response.match(/\[[\s\S]*?\]/);
            if (!jsonMatch) {
              console.error('Claude応答からJSONを抽出できません:', response.substring(0, 500));
              await supabasePost('learning_runs', {
                feedback_count: feedback.length,
                coefficients_updated: 0,
                summary: 'JSON解析失敗: ' + response.substring(0, 200),
                status: 'error',
              });
              return;
            }

            const coefficients = JSON.parse(jsonMatch[0]);
            console.log(`分析結果: ${coefficients.length}工種の係数を算出`);

            // 4. Supabaseの cost_coefficients テーブルを更新（upsert）
            for (const coeff of coefficients) {
              await supabasePost('cost_coefficients', {
                work_type: coeff.work_type,
                material_adjustment: coeff.material_adjustment,
                labor_adjustment: coeff.labor_adjustment,
                confidence: coeff.confidence,
                sample_count: byType[coeff.work_type]?.length || 0,
                avg_accuracy: coeff.avg_accuracy,
                notes: coeff.notes,
                updated_at: new Date().toISOString(),
              }, 'POST', { 'Prefer': 'resolution=merge-duplicates' });
            }

            console.log(`${coefficients.length}件の係数を更新完了`);

            // 5. 実行ログを記録
            await supabasePost('learning_runs', {
              feedback_count: feedback.length,
              coefficients_updated: coefficients.length,
              summary: `${Object.keys(byType).length}工種を分析、${coefficients.length}件の係数を更新。` +
                coefficients.filter(c => c.confidence >= 0.5).map(c =>
                  `${c.work_type}: 材料${c.material_adjustment}x 労務${c.labor_adjustment}x`
                ).join(', '),
              status: 'success',
            });

            console.log('=== 学習ループ完了 ===');
          }

          main().catch(e => { console.error(e); process.exit(1); });
          SCRIPT
